<form [formGroup]="form" (ngSubmit)="onSubmit()" class="row">
  <div formGroupName="category" novalidate>
    <div class="row">
      <input formControlName="id" type="hidden" />
      <mat-form-field class="col s2">
        <input matInput placeholder="Color" type="text" [value]="color" [style.background]="color"
          [cpCancelButton]="true" [cpCancelButtonClass]="'btn btn-primary btn-xs'" [(colorPicker)]="color"
          (colorPickerChange)="onChangeColorCmyk($event);color=$event" formControlName="color" />
      </mat-form-field>
      <mat-form-field class="col s12">
        <input matInput #input formControlName="description" placeholder="Description" required="required"
          data-length="255" />
        <mat-hint align="end">{{input.value?.length || 0}}/255</mat-hint>
      </mat-form-field>
    </div>
    <div class="col s12">
      <button mat-raised-button color="primary">
        Save
        <i class="material-icons right">send</i>
      </button>
    </div>
  </div>
</form>

<div class="categoriesContainer">
  <mat-card class="default-card" *ngFor="let category of categories">
    <mat-card-header>
      <div mat-card-avatar [style.background]="category.color" class="color-header"></div>
      <mat-card-title>{{category.description}}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button (click)="editCategory(category.id)">Edit</button>
      <button mat-button (click)="removeCategory(category.id)">Remove</button>
    </mat-card-actions>
  </mat-card>
</div>
